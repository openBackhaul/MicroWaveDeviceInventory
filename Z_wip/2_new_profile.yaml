  /core-model-1-4:control-construct/profile-collection/profile={uuid}:
    parameters:
      - in: path
        name: uuid
        required: true
        schema:
          type: string
          pattern: '^([a-z]{2,6})-([0-9]{1,2})-([0-9]{1,2})-([0-9]{1,2})-([a-z]+)-p-([0-9,a-f]{3})$'
          example: 'xy-15-3-2-action-p-000'
    get:
      operationId: getProfileInstance
      summary: 'Returns entire instance of Profile'
      tags:
        - Core
      security:
        - basicAuth: []
      responses:
        '200':
          description: 'Instance of Profile provided'
          content:
            application/json:
              schema:
                type: object
                required:
                  - core-model-1-4:profile
                properties:
                  core-model-1-4:profile:
                    oneOf:
                      - description: 'action profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - action-profile-1-0:action-profile-pac
                        additionalProperties: false
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                              - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                          action-profile-1-0:action-profile-pac:
                            type: object
                            required:
                              - action-profile-capability
                              - action-profile-configuration
                            properties:
                              action-profile-capability:
                                type: object
                                required:
                                  - operation-name
                                  - label
                                  - display-in-new-browser-window
                                properties:
                                  operation-name:
                                    type: string
                                  label:
                                    type: string
                                  input-value-list:
                                    type: array
                                    items:
                                      type: object
                                      required:
                                        - field-name
                                      properties:
                                        field-name:
                                          type: string
                                        unit:
                                          type: string
                                  display-in-new-browser-window:
                                    type: boolean
                              action-profile-configuration:
                                type: object
                                required:
                                  - consequent-operation-reference
                                properties:
                                  consequent-operation-reference:
                                    type: string
                      - description: 'generic response profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - response-profile-1-0:response-profile-pac
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                              - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                          response-profile-1-0:response-profile-pac:
                            type: object
                            required:
                              - response-profile-capability
                              - response-profile-configuration
                            properties:
                              response-profile-capability:
                                type: object
                                required:
                                  - operation-name
                                  - field-name
                                  - datatype
                                properties:
                                  operation-name:
                                    type: string
                                  field-name:
                                    type: object
                                    minProperties: 1
                                    maxProperties: 1
                                    additionalProperties: false
                                    properties:
                                      static-field-name:
                                        type: string
                                      field-name-reference:
                                        type: string
                                  description:
                                    type: string
                                  datatype:
                                    type: string
                              response-profile-configuration:
                                type: object
                                required:
                                  - value
                                properties:
                                  value:
                                    type: object
                                    minProperties: 1
                                    maxProperties: 1
                                    additionalProperties: false
                                    properties:
                                      static-value:
                                        type: string
                                      value-reference:
                                        type: string
                      - description: 'file profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - file-profile-1-0:file-profile-pac
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                              - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                          file-profile-1-0:file-profile-pac:
                            type: object
                            required:
                              - file-profile-capability
                              - file-profile-configuration
                            properties:
                              file-profile-capability:
                                type: object
                                required:
                                  - file-identifier
                                  - file-description
                                properties:
                                  file-identifier:
                                    type: string
                                  file-description:
                                    type: string
                              file-profile-configuration:
                                type: object
                                required:
                                  - file-name
                                properties:
                                  file-name:
                                    type: string
                                  operation:
                                    type: string
                                    enum:
                                      - 'file-profile-1-0:OPERATION_TYPE_READ_ONLY'
                                      - 'file-profile-1-0:OPERATION_TYPE_READ_WRITE'
                                      - 'file-profile-1-0:OPERATION_TYPE_OFF'
                                      - 'file-profile-1-0:OPERATION_TYPE_NOT_YET_DEFINED'
                      - description: 'integer profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - integer-profile-1-0:integer-profile-pac
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                              - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                          integer-profile-1-0:integer-profile-pac:
                            type: object
                            required:
                              - integer-profile-capability
                              - integer-profile-configuration
                            properties:
                              integer-profile-capability:
                                type: object
                                required:
                                  - integer-name
                                properties:
                                  integer-name:
                                    type: string
                                  purpose:
                                    type: string
                                  unit:
                                    type: string
                                  minimum:
                                    type: integer
                                  maximum:
                                    type: integer
                              integer-profile-configuration:
                                type: object
                                required:
                                  - integer-value
                                properties:
                                  integer-value:
                                    type: integer
                      - description: 'string profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - string-profile-1-0:string-profile-pac
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                          string-profile-1-0:string-profile-pac:
                            type: object
                            required:
                              - string-profile-capability
                              - string-profile-configuration
                            properties:
                              string-profile-capability:
                                type: object
                                required:
                                  - string-name
                                properties:
                                  string-name:
                                    type: string
                                  enumeration:
                                    type: array
                                    items:
                                      type: string
                                  pattern:
                                    type: string
                              string-profile-configuration:
                                type: object
                                required:
                                  - string-value
                                properties:
                                  string-value:
                                    type: string
                      - description: 'mapping profile'
                        type: object
                        required:
                          - uuid
                          - profile-name
                          - mapping-profile-1-0:string-profile-pac
                        properties:
                          uuid:
                            type: string
                          profile-name:
                            type: string
                            enum:
                              - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                              - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                              - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                              - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                              - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                              - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                          mapping-profile-1-0:string-profile-pac:
                            type: object
                            required:
                              - mapping-profile-capability
                              - mapping-profile-configuration
                            properties:
                              mapping-profile-capability:
                                type: object
                                required:
                                  - mapping-name
                                properties:
                                  mapping-name:
                                    type: string
                                  purpose:
                                    type: string
                              mapping-profile-configuration:
                                type: object
                                required:
                                  - mapping-list
                                properties:
                                  mapping-list:
                                    type: array
                                    items:
                                      type: object
                                      required:
                                        - regex-string
                                        - map-to-string
                                      properties:
                                        regex-string:
                                          type: string
                                        map-to-string:
                                          type: string
              example:
                core-model-1-4:profile:
                  uuid: 'xy-15-3-2-action-p-000'
                  profile-name: 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                  action-profile-1-0:action-profile-pac:
                    action-profile-capability:
                      operation-name: '/v1/start-application-in-generic-representation'
                      label: 'Inform about Application'
                      input-value-list:
                        - field-name: 'Label of input field'
                          unit: 'Unit at input field'
                      display-in-new-browser-window: false
                    action-profile-configuration:
                      consequent-operation-reference: '/core-model-1-4:control-construct/logical-termination-point=mwdi-2-0-1-op-s-bs-002/layer-protocol=0/operation-server-interface-1-0:operation-server-interface-pac/operation-server-interface-capability/operation-name'
        '400':
          $ref: '#/components/responses/responseForErroredOamRequests'
        '401':
          $ref: '#/components/responses/responseForErroredOamRequests'
        '403':
          $ref: '#/components/responses/responseForErroredOamRequests'
        '404':
          $ref: '#/components/responses/responseForErroredOamRequests'
        '500':
          $ref: '#/components/responses/responseForErroredOamRequests'
        default:
          $ref: '#/components/responses/responseForErroredOamRequests'
  /core-model-1-4:control-construct:
    get:
      operationId: getControlConstruct
      summary: 'Returns entire data tree'
      tags:
        - Core
      security:
        - basicAuth: []
      responses:
        '200':
          description: 'ControlConstruct provided'
          content:
            application/json:
              schema:
                type: object
                required:
                  - core-model-1-4:control-construct
                properties:
                  core-model-1-4:control-construct:
                    type: object
                    required:
                      - uuid
                      - profile-collection
                      - logical-termination-point
                      - forwarding-domain
                    properties:
                      uuid:
                        type: string
                        pattern: '^([a-z]{2,6})-([0-9]+)-([0-9]+)-([0-9]+)$'
                        example: 'xy-15-3-2'
                      profile-collection:
                        type: object
                        required:
                          - profile
                        properties:
                          profile:
                            type: array
                            uniqueItems: true
                            items:
                              oneOf:
                                - description: 'action profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    # Bug in the postman mock server
                                    # original code is:
                                    # - action-profile-1-0:action-profile-pac
                                    # workaround code is:
                                    # - empty line -
                                  additionalProperties: false
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    action-profile-1-0:action-profile-pac:
                                      type: object
                                      required:
                                        - action-profile-capability
                                        - action-profile-configuration
                                      properties:
                                        action-profile-capability:
                                          type: object
                                          required:
                                            - operation-name
                                            - label
                                            - display-in-new-browser-window
                                          properties:
                                            operation-name:
                                              type: string
                                            label:
                                              type: string
                                            input-value-list:
                                              type: array
                                              items:
                                                type: object
                                                required:
                                                  - field-name
                                                properties:
                                                  field-name:
                                                    type: string
                                                  unit:
                                                    type: string
                                            display-in-new-browser-window:
                                              type: boolean
                                        action-profile-configuration:
                                          type: object
                                          required:
                                            - consequent-operation-reference
                                          properties:
                                            consequent-operation-reference:
                                              type: string
                                - description: 'generic response profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    - response-profile-1-0:response-profile-pac
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    response-profile-1-0:response-profile-pac:
                                      type: object
                                      required:
                                        - response-profile-capability
                                        - response-profile-configuration
                                      properties:
                                        response-profile-capability:
                                          type: object
                                          required:
                                            - operation-name
                                            - field-name
                                            - datatype
                                          properties:
                                            operation-name:
                                              type: string
                                            field-name:
                                              type: object
                                              minProperties: 1
                                              maxProperties: 1
                                              additionalProperties: false
                                              properties:
                                                static-field-name:
                                                  type: string
                                                field-name-reference:
                                                  type: string
                                            description:
                                              type: string
                                            datatype:
                                              type: string
                                        response-profile-configuration:
                                          type: object
                                          required:
                                            - value
                                          properties:
                                            value:
                                              type: object
                                              minProperties: 1
                                              maxProperties: 1
                                              additionalProperties: false
                                              properties:
                                                static-value:
                                                  type: string
                                                value-reference:
                                                  type: string
                                - description: 'file profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    - file-profile-1-0:file-profile-pac
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    file-profile-1-0:file-profile-pac:
                                      type: object
                                      required:
                                        - file-profile-capability
                                        - file-profile-configuration
                                      properties:
                                        file-profile-capability:
                                          type: object
                                          required:
                                            - file-identifier
                                            - file-description
                                          properties:
                                            file-identifier:
                                              type: string
                                            file-description:
                                              type: string
                                        file-profile-configuration:
                                          type: object
                                          required:
                                            - file-name
                                          properties:
                                            file-name:
                                              type: string
                                            operation:
                                              type: string
                                              enum:
                                                - 'file-profile-1-0:OPERATION_TYPE_READ_ONLY'
                                                - 'file-profile-1-0:OPERATION_TYPE_READ_WRITE'
                                                - 'file-profile-1-0:OPERATION_TYPE_OFF'
                                                - 'file-profile-1-0:OPERATION_TYPE_NOT_YET_DEFINED'
                                - description: 'integer profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    - integer-profile-1-0:integer-profile-pac
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    integer-profile-1-0:integer-profile-pac:
                                      type: object
                                      required:
                                        - integer-profile-capability
                                        - integer-profile-configuration
                                      properties:
                                        integer-profile-capability:
                                          type: object
                                          required:
                                            - integer-name
                                          properties:
                                            integer-name:
                                              type: string
                                            purpose:
                                              type: string
                                            unit:
                                              type: string
                                            minimum:
                                              type: integer
                                            maximum:
                                              type: integer
                                        integer-profile-configuration:
                                          type: object
                                          required:
                                            - integer-value
                                          properties:
                                            integer-value:
                                              type: integer
                                - description: 'string profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    - string-profile-1-0:string-profile-pac
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    string-profile-1-0:string-profile-pac:
                                      type: object
                                      required:
                                        - string-profile-capability
                                        - string-profile-configuration
                                      properties:
                                        string-profile-capability:
                                          type: object
                                          required:
                                            - string-name
                                          properties:
                                            string-name:
                                              type: string
                                            enumeration:
                                              type: array
                                              items:
                                                type: string
                                            pattern:
                                              type: string
                                        string-profile-configuration:
                                          type: object
                                          required:
                                            - string-value
                                          properties:
                                            string-value:
                                              type: string
                                - description: 'mapping profile'
                                  type: object
                                  required:
                                    - uuid
                                    - profile-name
                                    - mapping-profile-1-0:string-profile-pac
                                  properties:
                                    uuid:
                                      type: string
                                    profile-name:
                                      type: string
                                      enum:
                                        - 'action-profile-1-0:PROFILE_NAME_TYPE_ACTION_PROFILE'
                                        - 'response-profile-1-0:PROFILE_NAME_TYPE_GENERIC_RESPONSE_PROFILE'
                                        - 'file-profile-1-0:PROFILE_NAME_TYPE_FILE_PROFILE'
                                        - 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                        - 'string-profile-1-0:PROFILE_NAME_TYPE_STRING_PROFILE'
                                        - 'mapping-profile-1-0:PROFILE_NAME_TYPE_MAPPING_PROFILE'
                                    mapping-profile-1-0:string-profile-pac:
                                      type: object
                                      required:
                                        - mapping-profile-capability
                                        - mapping-profile-configuration
                                      properties:
                                        mapping-profile-capability:
                                          type: object
                                          required:
                                            - mapping-name
                                          properties:
                                            mapping-name:
                                              type: string
                                            purpose:
                                              type: string
                                        mapping-profile-configuration:
                                          type: object
                                          required:
                                            - mapping-list
                                          properties:
                                            mapping-list:
                                              type: array
                                              items:
                                                type: object
                                                required:
                                                  - regex-string
                                                  - map-to-string
                                                properties:
                                                  regex-string:
                                                    type: string
                                                  map-to-string:
                                                    type: string
                                      example:
                                        - uuid: 'xy-15-3-2-integer-p-000'
                                          profile-name: 'integer-profile-1-0:PROFILE_NAME_TYPE_INTEGER_PROFILE'
                                          integer-profile-1-0:integer-profile-pac:
                                            integer-profile-capability:
                                              integer-name: 'maximumNumberOfEntries'
                                              purpose: 'Limiting the number of entries for controlling the storage consumption and access response time'
                                              unit: 'records'
                                              minimum: 0
                                              maximum: 1000000
                                            integer-profile-configuration:
                                              integer-value: 1000000
                      logical-termination-point:
                        type: array
                        uniqueItems: true
                        items:
                          type: object
                          required:
                            - uuid
                            - ltp-direction
                            - client-ltp
                            - server-ltp
                            - layer-protocol
                          properties:
                            uuid:
                              type: string
                            ltp-direction:
                              type: string
                              enum:
                                - 'core-model-1-4:TERMINATION_DIRECTION_BIDIRECTIONAL'
                                - 'core-model-1-4:TERMINATION_DIRECTION_SINK'
                                - 'core-model-1-4:TERMINATION_DIRECTION_SOURCE'
                                - 'core-model-1-4:TERMINATION_DIRECTION_UNDEFINED_OR_UNKNOWN'
                            client-ltp:
                              type: array
                              uniqueItems: true
                              items:
                                type: string
                            server-ltp:
                              type: array
                              uniqueItems: true
                              items:
                                type: string
                            layer-protocol:
                              type: array
                              minItems: 1
                              maxItems: 1
                              items:
                                oneOf:
                                  - description: 'operation server'
                                    type: object
                                    required:
                                      - local-id
                                      - layer-protocol-name
                                      - operation-server-interface-1-0:operation-server-interface-pac
                                    properties:
                                      local-id:
                                        type: string
                                      layer-protocol-name:
                                        type: string
                                        enum:
                                          - 'operation-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'http-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                          - 'operation-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'elasticsearch-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_ELASTICSEARCH_LAYER'
                                          - 'kafka-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_KAFKA_LAYER'
                                          - 'http-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                      operation-server-interface-1-0:operation-server-interface-pac:
                                        type: object
                                        required:
                                          - operation-server-interface-capability
                                          - operation-server-interface-configuration
                                        properties:
                                          operation-server-interface-capability:
                                            type: object
                                            required:
                                              - operation-name
                                            properties:
                                              operation-name:
                                                type: string
                                          operation-server-interface-configuration:
                                            type: object
                                            required:
                                              - life-cycle-state
                                              - operation-key
                                            properties:
                                              life-cycle-state:
                                                type: string
                                                enum:
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_EXPERIMENTAL'
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_OPERATIONAL'
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_DEPRECATED'
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_OBSOLETE'
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_UNKNOWN'
                                                  - 'operation-server-interface-1-0:LIFE_CYCLE_STATE_TYPE_NOT_YET_DEFINED'
                                              operation-key:
                                                type: string
                                  - description: 'http server'
                                    type: object
                                    required:
                                      - local-id
                                      - layer-protocol-name
                                      - http-server-interface-1-0:http-server-interface-pac
                                    properties:
                                      local-id:
                                        type: string
                                      layer-protocol-name:
                                        type: string
                                        enum:
                                          - 'operation-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'http-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                          - 'operation-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'elasticsearch-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_ELASTICSEARCH_LAYER'
                                          - 'kafka-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_KAFKA_LAYER'
                                          - 'http-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                      http-server-interface-1-0:http-server-interface-pac:
                                        type: object
                                        required:
                                          - http-server-interface-capability
                                        properties:
                                          http-server-interface-capability:
                                            type: object
                                            required:
                                              - application-name
                                              - release-number
                                              - application-purpose
                                              - data-update-period
                                              - owner-name
                                              - owner-email-address
                                              - release-list
                                            properties:
                                              application-name:
                                                type: string
                                              release-number:
                                                type: string
                                              application-purpose:
                                                type: string
                                              data-update-period:
                                                type: string
                                                enum:
                                                  - 'http-server-interface-1-0:DATA_UPDATE_PERIOD_TYPE_REAL_TIME'
                                                  - 'http-server-interface-1-0:DATA_UPDATE_PERIOD_TYPE_1H_PERIOD'
                                                  - 'http-server-interface-1-0:DATA_UPDATE_PERIOD_TYPE_24H_PERIOD'
                                                  - 'http-server-interface-1-0:DATA_UPDATE_PERIOD_TYPE_MANUAL'
                                              owner-name:
                                                type: string
                                              owner-email-address:
                                                type: string
                                              release-list:
                                                type: array
                                                uniqueItems: true
                                                items:
                                                  type: object
                                                  required:
                                                    - local-id
                                                    - release-number
                                                    - release-date
                                                    - changes
                                                  properties:
                                                    local-id:
                                                      type: string
                                                    release-number:
                                                      type: string
                                                    release-date:
                                                      type: string
                                                    changes:
                                                      type: string
                                  - description: 'tcp server'
                                    type: object
                                    required:
                                      - local-id
                                      - layer-protocol-name
                                      - tcp-server-interface-1-0:tcp-server-interface-pac
                                    properties:
                                      local-id:
                                        type: string
                                      layer-protocol-name:
                                        type: string
                                        enum:
                                          - 'operation-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'http-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                          - 'operation-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'elasticsearch-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_ELASTICSEARCH_LAYER'
                                          - 'kafka-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_KAFKA_LAYER'
                                          - 'http-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                      tcp-server-interface-1-0:tcp-server-interface-pac:
                                        type: object
                                        required:
                                          - tcp-server-interface-configuration
                                        properties:
                                          tcp-server-interface-configuration:
                                            type: object
                                            required:
                                              - description
                                              - local-protocol
                                              - local-address
                                              - local-port
                                            properties:
                                              description:
                                                type: string
                                              local-protocol:
                                                type: string
                                              local-address:
                                                type: object
                                                minProperties: 1
                                                maxProperties: 1
                                                additionalProperties: false
                                                properties:
                                                  ipv-4-address:
                                                    type: string
                                                  domain-name:
                                                    type: string
                                              local-port:
                                                type: integer
                                  - description: 'operation client'
                                    type: object
                                    required:
                                      - local-id
                                      - layer-protocol-name
                                      - operation-client-interface-1-0:operation-client-interface-pac
                                    properties:
                                      local-id:
                                        type: string
                                      layer-protocol-name:
                                        type: string
                                        enum:
                                          - 'operation-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'http-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                          - 'operation-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'elasticsearch-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_ELASTICSEARCH_LAYER'
                                          - 'kafka-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_KAFKA_LAYER'
                                          - 'http-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                      operation-client-interface-1-0:operation-client-interface-pac:
                                        type: object
                                        required:
                                          - operation-client-interface-configuration
                                          - operation-client-interface-status
                                        properties:
                                          operation-client-interface-configuration:
                                            type: object
                                            required:
                                              - operation-name
                                              - operation-key
                                            properties:
                                              operation-name:
                                                type: string
                                              operation-key:
                                                type: string
                                              detailed-logging-is-on:
                                                type: boolean
                                          operation-client-interface-status:
                                            type: object
                                            required:
                                              - operational-state
                                              - life-cycle-state
                                            properties:
                                              operational-state:
                                                type: string
                                                enum:
                                                  - 'operation-client-interface-1-0:OPERATIONAL_STATE_TYPE_EXPERIMENTAL'
                                                  - 'operation-client-interface-1-0:OPERATIONAL_STATE_TYPE_AVAILABLE'
                                                  - 'operation-client-interface-1-0:OPERATIONAL_STATE_TYPE_UNAVAILABLE'
                                                  - 'operation-client-interface-1-0:OPERATIONAL_STATE_TYPE_NOT_YET_DEFINED'
                                              life-cycle-state:
                                                type: string
                                                enum:
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_EXPERIMENTAL'
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_OPERATIONAL'
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_DEPRECATED'
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_OBSOLETE'
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_UNKNOWN'
                                                  - 'operation-client-interface-1-0:LIFE_CYCLE_STATE_TYPE_NOT_YET_DEFINED'
                                  - description: 'elasticsearch client'
                                    type: object
                                    required:
                                      - local-id
                                      - layer-protocol-name
                                      - elasticsearch-client-interface-1-0:elasticsearch-client-interface-pac
                                    properties:
                                      local-id:
                                        type: string
                                      layer-protocol-name:
                                        type: string
                                        enum:
                                          - 'operation-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'http-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-server-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                          - 'operation-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_OPERATION_LAYER'
                                          - 'elasticsearch-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_ELASTICSEARCH_LAYER'
                                          - 'kafka-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_KAFKA_LAYER'
                                          - 'http-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_HTTP_LAYER'
                                          - 'tcp-client-interface-1-0:LAYER_PROTOCOL_NAME_TYPE_TCP_LAYER'
                                      elasticsearch-client-interface-1-0:elasticsearch-client-interface-pac:
                                        type: object
                                        required:
                                          - elasticsearch-client-interface-configuration
                                          - elasticsearch-client-interface-status
                                        properties:
                                          elasticsearch-client-interface-configuration:
                                            type: object
                                            required:
                                              - auth
                                              - index-alias
                                            properties:
                                              auth:
                                                type: object
                                                minProperties: 1
                                                additionalProperties: false
                                                properties:
                                                  api-key:
                                                    type: string
                                                    description: 'base64EncodedKey'
                                              index-alias:
                                                type: string
                                              service-records-policy:
                                                type: object
                                                required:
                                                  - service-records-policy-name
                                                  - phases
                                                properties:
                                                  service-records-policy-name:
                                                    type: string
                                                  description:
                                                    type: string
                                                  project:
                                                    type: object
                                                    properties:
                                                      name:
                                                        type: string
                                                      department:
                                                        type: string
                                                  phases:
                                                    type: object
                                                    properties:
                                                      hot:
                                                        type: object
                                                        properties:
                                                          min-age:
                                                            type: string
                                                          actions:
                                                            type: object
                                                            properties:
                                                              forcemerge:
                                                                type: object
                                                                required:
                                                                  - max-num-segments
                                                                properties:
                                                                  max-num-segments:
                                                                    type: integer
                                                                  index-codec:

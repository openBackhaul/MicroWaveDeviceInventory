      field-name-reference: '/core-model-1-4:control-construct/logical-termination-point=mwdi-2-1-0-http-s-000/layer-protocol=0/http-server-interface-1-0:http-server-interface-pac/http-server-interface-capability/release-list=5/release-number'
      description: 'Represents the 6th entry in the list of releases'

      value-reference: '/core-model-1-4:control-construct/logical-termination-point=mwdi-2-1-0-http-s-000/layer-protocol=0/http-server-interface-1-0:http-server-interface-pac/http-server-interface-capability/release-list=5/changes'

  - profile-name: 'FileProfile'
    uuid: 'mwdi-2-1-0-file-p-000'
    capability:
      file-identifier: 'EncryptedOdlKey'
      file-description: 'Authorization key for OpenDayLight'
    configuration:
      file-name: 'encrypted-odl-key.json'
      operation: 'read'

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-000'
    capability:
      integer-name: 'slidingWindowSize'
      purpose: 'Size of the sliding window for ControlConstruct retrieval (i.e. parallel number of retrieval requests)'
      minimum: 1
      maximum: 5000
    configuration:
      integer-value: 500

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-001'
    capability:
      integer-name: 'responseTimeout'
      purpose: 'Timeout for receiving the response of the ControlConstruct retrieval from the Controller'
      unit: 'second'
      minimum: 5
      maximum: 2000
    configuration:
      integer-value: 900

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-002'
    capability:
      integer-name: 'maximumNumberOfRetries'
      purpose: 'Maximum number of retries for retrieving the ControlConstruct'
      minimum: 0
      maximum: 10
    configuration:
      integer-value: 0

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-003'
    capability:
      integer-name: 'deviceListSyncPeriod'
      purpose: 'Time period between the sync of MWDI deviceList with list of mounted devices on the Controller.'
      unit: 'hour'
      minimum: 1
      maximum: 72
    configuration:
      integer-value: 24

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-005'
    capability:
      integer-name: 'metadataRetentionPeriod'
      purpose: 'Time period for which no longer connected devices are kept in the metadata table, before they are deleted.'
      unit: 'days'
      minimum: 1
      maximum: 30
    configuration:
      integer-value: 14

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-006'
    capability:
      integer-name: 'qualityMeasurementUpdatePeriod'
      purpose: 'Time period until selection of the next candidate device to undergo the quality measurement process.'
      unit: 'minute'
      minimum: 1
      maximum: 60
    configuration:
      integer-value: 1

  - profile-name: 'IntegerProfile'
    uuid: 'mwdi-2-1-0-integer-p-007'
    capability:
      integer-name: 'qualityMeasurementSampleNumber'
      purpose: 'The number of qualityMeasurement raw samples to be kept.'
      minimum: 0
      maximum: 4320
    configuration:
      integer-value: 1440

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-000'
    capability:
      string-name: 'controllerInternalPathToMountPoint'
    configuration:
      string-value: 'rests/data/network-topology:network-topology/topology=topology-netconf'

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-002'
    capability:
      string-name: 'PromptForEmbeddingCausesCyclicLoadingOfDeviceStatusFromController.fieldsFilter'
    configuration:
      string-value: 'node(node-id;netconf-node-topology:connection-status;netconf-node-topology:schema-cache-directory)'

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-003'
    capability:
      string-name: 'PromptForEmbeddingCausesCyclicLoadingOfDeviceTypeInfo.fieldsFilter'
    configuration:
      string-value: 'equipment-augment-1-0:control-construct-pac(device-model-name)'

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-004'
    capability:
      string-name: 'historicalControlConstructPolicy'
      purpose: 'Per default, the ControlConstruct in the cache shall be deleted, if a device is no longer in connected state; this profile allows to configure otherwise'
      enumeration:
        - 'keep-on-disconnect'
        - 'delete-on-disconnect'
    configuration:
      string-value: 'delete-on-disconnect'

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-005'
    capability:
      string-name: 'kafkaNotificationReceiptAndProcessingSwitch'
      purpose: 'This profileInstance allows toggeling the receipt/fetching of notifications from Kafka and processing them on/off. Default is on.'
      enumeration:
        - 'on'
        - 'off'
    configuration:
      string-value: 'on'

  - profile-name: 'StringProfile'
    uuid: 'mwdi-2-1-0-string-p-006'
    capability:
      string-name: 'qualityMeasurementExclusions'
      purpose: 'This profileInstance lists attributes and classes to be excluded from the quality measurement comparison'
      enumeration:
        - 'firmware-component-status'
        - 'firmware-component-capability'
        - 'air-interface-status'
        - 'air-interface-capability'
        - 'air-interface-historical-performances'
        - 'air-interface-current-performance'
        - 'ethernet-container-status'
        - 'ethernet-container-capability'
        - 'ethernet-container-historical-performances'
        - 'ethernet-container-current-performance'
        - 'hybrid-mw-structure-status'
        - 'hybrid-mw-structure-capability'
        - 'hybrid-mw-structure-historical-performances'
        - 'hybrid-mw-structure-current-performance'
        - 'mac-interface-status'
        - 'mac-interface-capability'
        - 'pure-ethernet-structure-status'
        - 'pure-ethernet-structure-capability'
        - 'pure-ethernet-structure-historical-performances'
        - 'pure-ethernet-structure-current-performance'
        - 'vlan-interface-capability'
        - 'wire-interface-status'
        - 'wire-interface-capability'
        - 'wire-interface-historical-performances'
        - 'wire-interface-current-performance'
        - 'ip-interface-capability'
        - 'ip-interface-status'
        - 'tdm-container-capability'
        - 'tdm-container-status'
        - 'alarm-capability'
        - 'alarm-event-records'
        - 'backup-and-restore-capability'
        - 'backup-and-restore-status'
    configuration:
      string-value: 'on'

  - profile-name: 'RegexPatternMappingProfile'
    uuid: 'mwdi-2-1-0-mapping-p-001'
    capability:
      mapping-name: 'vendorFromDeviceTypeMapping'
      purpose: 'Used to map the vendor from device types'
    configuration:
      mapping-list:
        # Siae: AGS20, AGS20L, ALCPlus2e, ALFO80
        - regex-to-string: '(?i).*(AGS|ALC|ALFO).*'
          map-to-string: 'Siae'
        # Huawei: RTN900 (=RTN950/RTN905), RTN380* (380, 380AX, 380H)
        - regex-to-string: '(?i).*RTN.*'
          map-to-string: 'Huawei'
        # Ericsson: ML6352 (also UKL*), ML6600 (=ML6691, ML6693), MLTN (TrafficNode)
        - regex-to-string: '(?i)(?:.*(mini[-_\s]?link|ml).*|^UKL\s501\s57.*|.*(mltn|traffic[-_\s]?node).*)'
          map-to-string: 'Ericsson'
        # DEFAULT: unknown, if none above matches
        - regex-to-string: '(?i)^(?!.*(AGS|ALC|ALFO))(?!.*RTN)(?!.*(mini[-_\s]?link|ml))(?!UKL\s501\s57)(?!.*(mltn|traffic[-_\s]?node)).*'
          map-to-string: 'unknown'

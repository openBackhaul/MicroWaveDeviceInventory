    serviceRequestRecord:
      type: object
      required:
        - x-correlator
        - trace-indicator
        - user
        - originator
        - application-name
        - release-number
        - operation-name
        - response-code
        - timestamp
      properties:
        x-correlator:
          type: string
          pattern: '^[0-9A-Fa-f]{8}(?:-[0-9A-Fa-f]{4}){3}-[0-9A-Fa-f]{12}$'
          description: 'UUID for the service execution flow that allows to correlate requests and responses'
        trace-indicator:
          type: string
          pattern: '^([0-9]+)(\.([0-9]+))*$'
          description: 'Sequence of request numbers along the flow'
        user:
          type: string
          description: 'User identifier from the system starting the service call'
        originator:
          type: string
          minLength: 3
          description: 'ApplicationName on the client side'
        application-name:
          type: string
          minLength: 3
          description: 'ApplicationName on the server side'
        release-number:
          type: string
          pattern: '^([0-9]{1,2})\.([0-9]{1,2})\.([0-9]{1,2})$'
          description: 'ReleaseNumber on the server side'
        operation-name:
          type: string
          minLength: 6
          description: 'Name of operation consumed on the server side'
        response-code:
          type: integer
        timestamp:
          type: string
          description: 'Date and time when response was sent'
        stringified-body:
          type: string
          description: 'Body of the request'
        stringified-response:
          type: string
          description: 'Body of the response'
        url:
          type: string
          description: 'Complete URL that has been unsuccessfully addressed by some client'
        exec-time:
          type: integer
          description: 'Total elapsed time for executing the request by the server'

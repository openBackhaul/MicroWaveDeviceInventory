  /v1/list-records-of-flow:
    parameters:
      - $ref: '#/components/parameters/user'
      - $ref: '#/components/parameters/originator'
      - $ref: '#/components/parameters/x-correlator'
      - $ref: '#/components/parameters/trace-indicator'
      - $ref: '#/components/parameters/customer-journey'
    post:
      operationId: listRecordsOfFlow
      summary: 'Provides list of service request records belonging to the same flow'
      tags:
        - IndividualServices
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - x-correlator
                - latest-match
                - number-of-records
              properties:
                x-correlator:
                  type: string
                latest-match:
                  type: integer
                  description: 'Youngest record, which is matching the filter criteria, to be returned.'
                number-of-records:
                  type: integer
                  description: 'Maximum number of records to be returned.'
              example:
                x-correlator: '550e8400-e29b-11d4-a716-446655440000'
                latest-match: 0
                number-of-records: 100
      responses:
        '200':
          description: 'List of service request records of the same flow provided'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/serviceRequestRecord'
                  description: >
                    'from elasticsearch filtered for {$request.body#x-correlator}'
